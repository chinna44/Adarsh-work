name: Deploy Storage Mover - Test (non-prod)

on:
  workflow_dispatch:
    inputs:
      env:
        type: choice
        description: "Select the environment (test, dev, pre)"
        required: true
        options:
          - test
          - dev
          - pre
      action:
        type: choice
        description: "Action to perform"
        required: true
        options:
          - provision-infra
          - run-migration
          - check-status
          - teardown

permissions:
  id-token: write
  contents: read

env:
  TF_VERSION: '1.5.7'
  ARM_CLIENT_ID: ${{ vars.ARM_CLIENT_ID }}
  ARM_TENANT_ID: ${{ vars.ARM_TENANT_ID }}
  ARM_SUBSCRIPTION_ID: ${{ vars.ARM_SUBSCRIPTION_ID }}
  AZURE_CLIENT_SECRET: ${{ vars.AZURE_CLIENT_SECRET || secrets.AZURE_CLIENT_SECRET }}
  MOVER_RG: ${{ vars.MOVER_RG }}
  MOVER_NAME: ${{ vars.MOVER_NAME }}
  PROJECT_NAME: ${{ vars.PROJECT_NAME }}
  JOB_NAME: ${{ vars.JOB_NAME }}

jobs:
  storage-migration:
    runs-on: ubuntu-latest
    environment:
      name: ${{ inputs.env }}

    steps:
      - uses: actions/checkout@v4

      - name: 'Write terraform.tfvars from variable or secret (optional)'
        shell: bash
        run: |
          if [ -n "${{ vars.TEST_TFVARS }}" ]; then
            echo "Writing Test/terraform.tfvars from TEST_TFVARS repository/environment variable"
            printf '%s\n' '${{ vars.TEST_TFVARS }}' > Test/terraform.tfvars
          elif [ -n "${{ secrets.TEST_TFVARS }}" ]; then
            echo "Writing Test/terraform.tfvars from TEST_TFVARS secret"
            printf '%s\n' '${{ secrets.TEST_TFVARS }}' > Test/terraform.tfvars
          fi

      - name: Azure CLI Login
        shell: bash
        run: |
          set -e
          az cloud set -n AzureCloud
          az login --service-principal \
            --username "$ARM_CLIENT_ID" \
            --password "$AZURE_CLIENT_SECRET" \
            --tenant "$ARM_TENANT_ID"

      - name: Setup Terraform
        if: inputs.action == 'provision-infra' || inputs.action == 'teardown'
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        if: inputs.action == 'provision-infra' || inputs.action == 'teardown'
        working-directory: ./Test
        run: |
          terraform init -upgrade

      - name: Terraform Validate
        if: inputs.action == 'provision-infra'
        working-directory: ./Test
        run: terraform validate

      - name: Terraform Plan
        if: inputs.action == 'provision-infra'
        working-directory: ./Test
        run: terraform plan -var-file="./terraform.tfvars" -input=false

      - name: Terraform Apply
        if: inputs.action == 'provision-infra'
        working-directory: ./Test
        run: terraform apply --auto-approve -var-file="./terraform.tfvars" -input=false

      - name: Start Storage Mover Job
        if: inputs.action == 'run-migration'
        run: |
          az storage-mover job-definition start-job \
            --subscription ${{ env.ARM_SUBSCRIPTION_ID }} \
            --resource-group ${{ env.MOVER_RG }} \
            --storage-mover-name ${{ env.MOVER_NAME }} \
            --project-name ${{ env.PROJECT_NAME }} \
            --job-definition-name ${{ env.JOB_NAME }}

      - name: Poll Migration Until Complete
        if: inputs.action == 'run-migration'
        run: |
          echo "Polling job status every 60s (max 3 hours)..."
          for i in $(seq 1 180); do
            STATUS=$(az storage-mover job-run list \
              --subscription ${{ env.ARM_SUBSCRIPTION_ID }} \
              --resource-group ${{ env.MOVER_RG }} \
              --storage-mover-name ${{ env.MOVER_NAME }} \
              --project-name ${{ env.PROJECT_NAME }} \
              --job-definition-name ${{ env.JOB_NAME }} \
              --query "[-1].status" -o tsv)

            echo "[$i/180] Status: $STATUS"

            if [[ "$STATUS" == "Succeeded" ]]; then
              echo "Migration completed successfully"
              exit 0
            fi
            if [[ "$STATUS" == "Failed" || "$STATUS" == "Canceled" || "$STATUS" == "CancelRequested" ]]; then
              echo "Migration ended with status: $STATUS"
              exit 1
            fi
            sleep 60
          done
          echo "Timed out after 3 hours — check Azure portal for job status"
          exit 1

      - name: Check Migration Status
        if: inputs.action == 'check-status'
        run: |
          az storage-mover job-run list \
            --subscription ${{ env.ARM_SUBSCRIPTION_ID }} \
            --resource-group ${{ env.MOVER_RG }} \
            --storage-mover-name ${{ env.MOVER_NAME }} \
            --project-name ${{ env.PROJECT_NAME }} \
            --job-definition-name ${{ env.JOB_NAME }} \
            --query "[-1].{Status:status, Started:startTime, Ended:endTime, Files:statistics.filesTransferred, Bytes:statistics.bytesTransferred, Errors:statistics.filesErrored}" -o table

      - name: Terraform Destroy
        if: inputs.action == 'teardown'
        working-directory: ./Test
        run: terraform destroy --auto-approve -var-file="./terraform.tfvars" -input=false
